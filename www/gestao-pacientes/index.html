<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pacientes</title>
    <link rel="stylesheet" href="gestao-pacientes.css">
</head>
<body>

<header>Gestão de Pacientes</header>

<div class="main-container">
    <div class="sidebar">
        <div class="card">
            <h3>Página Inicial</h3>
            <a href="../inicio/index.html">Voltar</a>
        </div>
    </div>

    <div class="content-area">
        <div class="search-container">
            <select id="tipoBusca">
                <option value="">Todos</option>
                <option value="id">ID</option>
                <option value="nome">Nome</option>
                <option value="documento">CPF/CNPJ</option>
                <option value="telefone">Telefone</option>
                <option value="email">E-mail</option>
            </select>
            <input type="text" id="valorBusca" placeholder="Digite o valor">
            <button onclick="buscarPacientes()">Buscar</button>
            <a href="./cadastro/index.html" class="novo-btn">Novo</a>
        </div>

        <div class="table-container">
            <h2>Lista de Pacientes</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Idade</th>
                        <th>Telefone</th>
                        <th>Email</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaPacientes">
                    <!-- Lista de pacientes será carregada aqui -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<script src="script.js"></script>

</body>
</html>
