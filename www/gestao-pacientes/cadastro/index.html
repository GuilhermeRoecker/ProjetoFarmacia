<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pacientes</title>
    <link rel="stylesheet" href="cadastro.css">
</head>
<body>

<header>Cadastro de Pacientes</header>

<div class="main-container">
    <div class="sidebar">
        <div class="card">
            <h3>Voltar</h3>
            <a href="../index.html">Voltar</a>
        </div>
    </div>

    <div class="content-area">
        <div class="form-container">
            <h2>Cadastro de Pacientes</h2>
            <form>
                <label for="nome">Nome Completo:</label>
                <input type="text" id="nome" name="nome" placeholder="Nome Completo" required>

                <label for="nascimento">Data de Nascimento:</label>
                <input type="date" id="nascimento" name="nascimento" required>

                <label for="cpf">CPF:</label>
                <input type="text" id="cpf" name="cpf" placeholder="CPF" required>

                <label for="telefone">Telefone:</label>
                <input type="text" id="telefone" name="telefone" placeholder="Telefone" required>

                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" placeholder="E-mail">

                <label for="rua">Endereço:</label>
                <input type="text" id="rua" name="rua" placeholder="Rua">
                <input type="text" id="numero" name="numero" placeholder="Número">
                <input type="text" id="bairro" name="bairro" placeholder="Bairro">
                <input type="text" id="cidade" name="cidade" placeholder="Cidade">
                <input type="text" id="estado" name="estado" placeholder="Estado">
                <input type="text" id="cep" name="cep" placeholder="CEP">

                <label for="PessoaTipo">Tipo de Pessoa:</label>
                <div class="tipo-pessoa">
                    <div class="tipo-option">
                        <input type="checkbox" id="fisica" name="tipoPessoa" value="FISICA" 
                               onclick="selecionarTipo(this)" 
                               onkeypress="selecionarTipo(this)" 
                               onkeydown="selecionarTipo(this)" 
                               onkeyup="selecionarTipo(this)">
                        <label for="fisica">Física</label>
                    </div>
                    <div class="tipo-option">
                        <input type="checkbox" id="juridica" name="tipoPessoa" value="JURIDICA" 
                               onclick="selecionarTipo(this)" 
                               onkeypress="selecionarTipo(this)" 
                               onkeydown="selecionarTipo(this)" 
                               onkeyup="selecionarTipo(this)">
                        <label for="juridica">Jurídica</label>
                    </div>
                </div>

                <label for="prescricao">Anexar Prescrição (PDF ou Imagem):</label>
                <input type="file" id="prescricao" name="prescricao" accept="application/pdf, image/*">

                <button type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
</div>

</body>
</html>
