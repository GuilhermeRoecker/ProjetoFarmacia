<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Pedidos</title>
    <link rel="stylesheet" href="gestao-pedidos.css">
    <!-- Adicionando o FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>Gestão de Pedidos</header>

<div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="card">
            <h3>Voltar</h3>
            <a href="../inicio/index.html">Voltar</a>
        </div>
    </div>

    <!-- Área principal -->
    <div class="content-area">
        <!-- Barra de pesquisa e botão Novo -->
        <div class="search-container">
            <input type="text" placeholder="Buscar pedido...">
            <button class="search-btn">Buscar</button>
            <button class="novo-btn" onclick="abrirMenuLateral()">Novo Pedido</button>
        </div>

        <!-- Tabela de Pedidos -->
        <div class="table-container">
            <h2>Lista de Pedidos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nº Pedido</th>
                        <th>Paciente</th>
                        <th>Médico</th>
                        <th>Fórmula</th>
                        <th>Status</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Exemplo de pedido (será preenchido dinamicamente via backend) -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Menu lateral de cadastro de pedido -->
<div class="menu-lateral" id="menuLateral">
    <div class="menu-content">
        <h2>Novo Pedido</h2>
        <form>
            <label for="paciente">Paciente:</label>
            <div class="input-container">
                <input type="text" id="paciente" placeholder="Buscar Paciente" required>
                <button class="search-icon" type="button" onclick="buscarPaciente()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <label for="medico">Médico:</label>
            <div class="input-container">
                <input type="text" id="medico" placeholder="Buscar Médico" required>
                <button class="search-icon" type="button" onclick="buscarMedico()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <label for="formula">Fórmula:</label>
            <div class="input-container">
                <input type="text" id="formula" placeholder="Buscar Fórmula" required>
                <button class="search-icon" type="button" onclick="buscarFormula()">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <label for="quantidade">Quantidade:</label>
            <input type="number" id="quantidade" min="1" required>

            <label for="preco">Preço Estimado:</label>
            <input type="text" id="preco" readonly>

            <label for="status">Status:</label>
            <select id="status">
                <option value="em_preparacao">Em Preparação</option>
                <option value="finalizado">Finalizado</option>
                <option value="entregue">Entregue</option>
            </select>

            <button type="submit">Cadastrar Pedido</button>
        </form>
        <button class="close-btn" onclick="fecharMenuLateral()">Fechar</button>
    </div>
</div>
<script src="script.js"></script>
<script>
    function buscarPaciente() {
        const paciente = document.getElementById('paciente').value;
        console.log('Buscando paciente:', paciente);
        // Lógica de busca no banco de dados
    }

    function buscarMedico() {
        const medico = document.getElementById('medico').value;
        console.log('Buscando médico:', medico);
        // Lógica de busca no banco de dados
    }

    function buscarFormula() {
        const formula = document.getElementById('formula').value;
        console.log('Buscando fórmula:', formula);
        // Lógica de busca no banco de dados
    }

    function abrirMenuLateral() {
        document.getElementById("menuLateral").classList.add("aberto");
    }

    function fecharMenuLateral() {
        document.getElementById("menuLateral").classList.remove("aberto");
    }
</script>



</body>
</html>
