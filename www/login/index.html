<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Farmácia Online</h1>
    </header>

    <!-- Corpo de Login -->
    <div class="corpo-login">
        <div class="login-container">
            <h1>Login</h1>
            <form id="loginForm">
                <input type="text" name="usuario" placeholder="Nome de usuário" class="styled-input" required>
                <input type="password" name="senha" placeholder="Senha" class="styled-input" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

</body>
</html>
