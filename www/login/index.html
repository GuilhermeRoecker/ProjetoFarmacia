<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Login</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
</head>
<body>

    <!-- Header -->
    <header>
        <h1>Farmácia Online</h1>
    </header>

    <!-- Corpo de Login -->
    <div class="corpo-login">
        <div class="login-container">
            <h1>Login</h1>
            <form id="loginForm">
                <input type="text" name="username" placeholder="Nome de usuário" class="styled-input" required>
                <input type="password" name="password" placeholder="Senha" class="styled-input" required>
                <button type="submit">Entrar</button>
            </form>
            <p id="error-message" style="color: red; margin-top: 10px; display: none;"></p> <!-- AQUI -->
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
