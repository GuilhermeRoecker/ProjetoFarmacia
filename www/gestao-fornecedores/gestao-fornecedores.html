<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Fornecedores</title>
    <link rel="stylesheet" href="gestao-fornecedores.css">
    <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
</head>

<body>

    <header>Gestão de Fornecedores</header>

    <div class="main-container">
        <div class="sidebar">
            <div class="card">
                <h3>Página Inicial</h3>
                <a href="../inicio/index.html">Voltar</a>
            </div>
        </div>

        <div class="content-area">
            <div class="search-container">
                <select id="tipoBusca">
                    <option value="">Todos</option>
                    <option value="id">ID</option>
                    <option value="nome">Nome</option>
                    <option value="documento">CPF/CNPJ</option>
                    <option value="telefone">Telefone</option>
                    <option value="email">E-mail</option>
                </select>
                <input type="text" id="valorBusca" placeholder="Digite o valor">
                <button onclick="buscarFornecdor()">Buscar</button>
                <button class="novo-btn" onclick="abrirCadastro()">Novo</button>
            </div>

            <div class="table-container">
                <h2>Lista de Fornecedores</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Idade</th>
                            <th>Telefone</th>
                            <th>Email</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaFornecedores">
                        <!-- Lista de fornecedores será carregada aqui -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div class="offcanvas" id="cadastroOffcanvas">
        <h2>Novo Fornecedor</h2>
        <form id="formCadastro" class="offcanvas-content">

            <!-- Seção: Dados da Empresa -->
            <div class="offcanvas-section">
                <h2>Dados da Empresa</h2>

                <div>
                    <label for="nome">Nome</label>
                    <input type="text" id="nome" name="nome" required>
                </div>

                <div>
                    <label for="nascimento">Data de Funda;áo</label>
                    <input type="date" id="nascimento" name="nascimento">
                </div>

                <div>
                    <label for="tipoPessoa">Tipo de Pessoa</label>
                    <select id="tipoPessoa" name="tipoPessoa" required>
                        <option value="FISICA">Física (CPF)</option>
                        <option value="JURIDICA">Jurídica (CNPJ)</option>
                    </select>
                </div>

                <div>
                    <label for="documento">CPF / CNPJ</label>
                    <input type="text" id="documento" name="documento" required>
                </div>

                    <div>
                        <label for="razaoSocial">Razão Social</label>
                        <input type="text" id="razaoSocial" name="razaoSocial" required>
                    </div>

                    <div>
                        <label for="inscricaoEstadual">Inscrição Estadual</label>
                        <input type="text" id="inscricaoEstadual" name="inscricaoEstadual">
                    </div>
                </div>

                <div>
                    <label for="telefone">Telefone</label>
                    <input type="tel" id="telefone" name="telefone">
                </div>

                <div>
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email">
                </div>


            <!-- Seção: Endereço -->
            <div class="offcanvas-section">
                <h2>Endereço</h2>

                <div>
                    <label for="rua">Rua</label>
                    <input type="text" id="rua" name="rua">
                </div>

                <div>
                    <label for="numero">Número</label>
                    <input type="text" id="numero" name="numero">
                </div>

                <div>
                    <label for="bairro">Bairro</label>
                    <input type="text" id="bairro" name="bairro">
                </div>

                <div>
                    <label for="cidade">Cidade</label>
                    <input type="text" id="cidade" name="cidade">
                </div>

                <div>
                    <label for="estado">Estado</label>
                    <input type="text" id="estado" name="estado">
                </div>

                <div>
                    <label for="cep">CEP</label>
                    <input type="text" id="cep" name="cep">
                </div>

                <div>
                    <label for="observacoes">Observações</label>
                    <textarea id="observacoes" name="observacoes"></textarea>
                </div>

            </div>

            <!-- Botões -->
            <div class="offcanvas-section">
                <button type="submit">Cadastrar</button>
                <button type="button" onclick="fecharCadastro()">Cancelar</button>
            </div>

        </form>
    </div>

    <script src="script.js"></script>

</body>

</html>
