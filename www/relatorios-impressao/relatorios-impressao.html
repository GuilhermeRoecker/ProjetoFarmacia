<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Relatórios e Impressões</title>
    <link rel="stylesheet" href="relatorios-impressao.css">
    <!-- Adicionando o FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>Relatórios e Impressões</header>

<div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="card">
            <h3>Voltar</h3>
            <a href="../inicio/index.html">Voltar</a>
        </div>
    </div>

    <!-- Área principal -->
    <div class="content-area">
        <!-- Filtros de pesquisa -->
        <div class="search-container">
            <input type="date" id="dataInicio" placeholder="Data de Início">
            <input type="date" id="dataFim" placeholder="Data de Fim">
            <button class="search-btn">Gerar Relatório</button>
        </div>

        <!-- Relatórios -->
        <div class="table-container">
            <h2>Relatórios Disponíveis</h2>
            <table>
                <thead>
                    <tr>
                        <th>Relatório</th>
                        <th>Tipo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>Orçamento Detalhado</td>
                        <td>Pedido</td>
                        <td><button class="action-btn" onclick="gerarRelatorio('orcamento')">Imprimir</button></td>
                    </tr>
                    <tr>
                        <td>Relatório de Consumo de Insumos</td>
                        <td>Insumos</td>
                        <td><button class="action-btn" onclick="gerarRelatorio('consumo')">Imprimir</button></td>
                    </tr>
                    <tr>
                        <td>Histórico de Pedidos</td>
                        <td>Pedidos</td>
                        <td><button class="action-btn" onclick="gerarRelatorio('historico')">Imprimir</button></td>
                    </tr>
                    <tr>
                        <td>Relatório Financeiro</td>
                        <td>Financeiro</td>
                        <td><button class="action-btn" onclick="gerarRelatorio('financeiro')">Imprimir</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    function gerarRelatorio(tipo) {
        alert('Gerando relatório de tipo: ' + tipo);
        // Aqui você pode adicionar a lógica para gerar o relatório
    }
</script>

</body>
</html>
