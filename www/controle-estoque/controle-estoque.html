<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Gestão de Insumos</title>
    <link rel="stylesheet" href="controle-estoque.css">
</head>
<body>

    <header>
        Gestão de Insumos
    </header>

    <div class="main-container">
        <div class="sidebar">
            <div class="card">
                <a href="../index.html">Voltar ao Início</a>
            </div>
        </div>

        <div class="content-area">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="Pesquisar insumo...">
                <a href="#" class="novo-btn" id="abrirMenuBtn">Novo Insumo</a>
            </div>

            <div class="table-container">
                <h2>Lista de Insumos</h2>
                <table>
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>Tipo</th>
                            <th>Fabricante</th>
                            <th>Fornecedor</th>
                            <th>Estoque Atual</th>
                            <th>Estoque Mínimo</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabelaInsumos">
                        <!-- Insumos serão inseridos aqui -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Menu lateral -->
    <div class="menu-lateral" id="menuLateral">
        <div class="menu-content">
            <h2>Novo Insumo</h2>
            <form id="formInsumo">
                <input type="text" id="nome" placeholder="Nome do Insumo" required>
                <input type="text" id="tipo" placeholder="Tipo" required>
                <input type="text" id="fabricante" placeholder="Fabricante" required>

                <div class="input-with-icon">
                    <input type="text" id="fornecedor" placeholder="Fornecedor" readonly required>
                    <button type="button" class="icon-button" id="abrirModalFornecedor">🔍</button>
                </div>

                <input type="number" id="estoqueAtual" placeholder="Estoque Atual" required>
                <input type="number" id="estoqueMinimo" placeholder="Estoque Mínimo" required>
                <input type="date" id="dataValidade" placeholder="Data de Validade" required>
                <input type="number" id="prazoEntrega" placeholder="Prazo de Entrega (dias)" required>
                <input type="text" id="valorUnitario" placeholder="Valor Unitário" required>
                <input type="text" id="valorPorGmMl" placeholder="Valor por g/ml" required>
                <input type="url" id="siteFornecedor" placeholder="Site do Fornecedor" required>
                <textarea id="observacoes" placeholder="Observações"></textarea>

                <button type="submit">Cadastrar Insumo</button>
                <button type="button" class="close-btn" id="fecharMenuBtn">Cancelar</button>
            </form>
        </div>
    </div>

    <!-- Modal de Fornecedores -->
    <div id="modalFornecedor" class="modal">
        <div class="modal-content">
            <h2>Selecionar Fornecedor</h2>
            <input type="text" id="pesquisarFornecedor" placeholder="Pesquisar fornecedor...">
            <ul id="listaFornecedores">
                <!-- Lista de fornecedores -->
            </ul>
            <button id="fecharModalFornecedor">Fechar</button>
        </div>
    </div>

    <script>

    </script>

</body>
</html>
