<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="controle-estoque.css">
    <!-- Adicionando o FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
</head>
<body>

<header>Controle de Estoque</header>

<div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="card">
            <h3>Voltar</h3>
            <a href="../inicio/index.html">Voltar</a>
        </div>
    </div>

    <!-- Área principal -->
    <div class="content-area">
        <!-- Barra de pesquisa e botão Novo -->
        <div class="search-container">
            <input type="text" id="search" placeholder="Buscar insumo...">
            <button class="search-btn">Buscar</button>
            <button class="novo-btn" onclick="abrirFormulario()">Novo Insumo</button>
        </div>

        <!-- Tabela de Insumos -->
        <div class="table-container">
            <h2>Lista de Insumos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Fabricante</th>
                        <th>Fornecedor</th>
                        <th>Data de Validade</th>
                        <th>Valor Unitário</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Insumos cadastrados serão listados aqui dinamicamente -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Menu lateral de cadastro de insumo -->
<div class="menu-lateral" id="menuLateral">
    <div class="menu-content">
        <h2>Novo Insumo</h2>
        <form id="formCadastro">
            <label for="nome">Nome:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="tipo">Tipo:</label>
            <input type="text" id="tipo" name="tipo" required>

            <label for="fabricante">Fabricante:</label>
            <input type="text" id="fabricante" name="fabricante" required>

            <label for="fornecedor">Fornecedor:</label>
            <input type="text" id="fornecedor" name="fornecedor" required>

            <label for="siteFornecedor">Site do Fornecedor:</label>
            <input type="url" id="siteFornecedor" name="siteFornecedor" required>

            <label for="validade">Data de Validade:</label>
            <input type="date" id="validade" name="validade" required>

            <label for="prazoEntrega">Prazo de Entrega (dias):</label>
            <input type="number" id="prazoEntrega" name="prazoEntrega" required>

            <label for="valorUnitario">Valor Unitário (R$):</label>
            <input type="number" id="valorUnitario" name="valorUnitario" step="0.01" required>

            <label for="valorGram">Valor por Grama/ML (R$):</label>
            <input type="number" id="valorGram" name="valorGram" step="0.01" required>

            <button type="submit" class="submit-btn">Cadastrar Insumo</button>
        </form>
        <button class="close-btn" onclick="fecharFormulario()">Fechar</button>
    </div>
</div>
<script src="script.js"></script>
<script>
    function abrirFormulario() {
        document.getElementById("menuLateral").classList.add("aberto");
    }

    function fecharFormulario() {
        document.getElementById("menuLateral").classList.remove("aberto");
    }

    document.getElementById('formCadastro').addEventListener('submit', function(event) {
        event.preventDefault();  // Impede o envio do formulário para demonstração
        alert('Insumo cadastrado com sucesso!');
        document.getElementById('formCadastro').reset();  // Limpa o formulário
        fecharFormulario();
    });
</script>

</body>
</html>
