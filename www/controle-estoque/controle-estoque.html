<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Controle de Estoque</title>
    <link rel="stylesheet" href="controle-estoque.css">
    <!-- Adicionando o FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="icon" href="../assets/favicon.ico" type="image/x-icon">
</head>
<body>

<header>Controle de Estoque</header>

<div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="card">
            <h3>Voltar</h3>
            <a href="../inicio/index.html">Voltar</a>
        </div>
    </div>

    <!-- Área principal -->
    <div class="content-area">
        <!-- Barra de pesquisa e botão Novo -->
        <div class="search-container">
            <input type="text" id="search" placeholder="Buscar insumo...">
            <button class="search-btn">Buscar</button>
            <button class="novo-btn" onclick="abrirFormulario()">Novo Insumo</button>
        </div>

        <!-- Tabela de Insumos -->
        <div class="table-container">
            <h2>Lista de Insumos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Tipo</th>
                        <th>Fabricante</th>
                        <th>Fornecedor</th>
                        <th>Data de Validade</th>
                        <th>Valor Unitário</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaInsumos">
                    <!-- Insumos cadastrados serão listados aqui dinamicamente -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Menu lateral de cadastro de insumo -->
<div class="menu-lateral" id="menuLateral">
    <div class="menu-content">
      <h2>Novo Insumo</h2>
      <form id="formCadastro">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" required>
  
        <label for="tipo">Tipo:</label>
        <input type="text" id="tipo" name="tipo" required>
  
        <label for="fabricante">Fabricante:</label>
        <input type="text" id="fabricante" name="fabricante" required>
  
        <label for="fornecedor">Fornecedor:</label>
        <div class="input-with-icon">
          <input type="search" id="fornecedor" name="fornecedor" required readonly placeholder="Selecione o fornecedor">
          <button type="button" class="icon-button" onclick="abrirModalFornecedor()">
            <i class="fas fa-search"></i>
          </button>
        </div>

        <label for="siteFornecedor">Site do Fornecedor:</label>
        <input type="url" id="siteFornecedor" name="siteFornecedor" required>
  
        <label for="validade">Data de Validade:</label>
        <input type="date" id="validade" name="validade" required>
  
        <label for="prazoEntrega">Prazo de Entrega:</label>
        <input type="text" id="prazoEntrega" name="prazoEntrega" required>
  
        <label for="quantidadeEstoque">Quantidade em Estoque:</label>
        <input type="number" id="quantidadeEstoque" name="quantidadeEstoque" min="0" required>
  
        <label for="quantidadeMinimaEstoque">Estoque Mínimo:</label>
        <input type="number" id="quantidadeMinimaEstoque" name="quantidadeMinimaEstoque" min="0" required>
  
        <label for="precoCusto">Preço de Custo (R$):</label>
        <input type="number" id="precoCusto" name="precoCusto" step="0.01" required>
  
        <label for="precoVenda">Preço de Venda (R$):</label>
        <input type="number" id="precoVenda" name="precoVenda" step="0.01" required>
  
        <label for="unidadeMedida">Unidade de Medida:</label>
        <input type="text" id="unidadeMedida" name="unidadeMedida" required>
  
        <label for="descricao">Descrição:</label>
        <textarea id="descricao" name="descricao" rows="4" required></textarea>
  
        <button type="submit" class="submit-btn">Cadastrar Insumo</button>
      </form>
      <button class="close-btn" onclick="fecharFormulario()">Fechar</button>
    </div>
  </div>
  
  <!-- Modal de Fornecedores -->
<div id="modalFornecedor" class="modal">
    <div class="modal-content">
      <h2>Selecionar Fornecedor</h2>
      <input type="text" id="pesquisarFornecedor" placeholder="Pesquisar fornecedor...">
      <ul id="listaFornecedores">
        <!-- Fornecedores serão carregados aqui -->
      </ul>
      <button onclick="fecharModalFornecedor()">Fechar</button>
    </div>
  </div>

<script src="script.js"></script>

</body>
</html>
