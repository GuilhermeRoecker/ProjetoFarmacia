<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Produtos para Venda</title>
    <link rel="stylesheet" href="cadastro-produtos-venda.css">
    <!-- Adicionando o FontAwesome para ícones -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>

<header>Cadastro de Produtos para Venda</header>

<div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="card">
            <h3>Voltar</h3>
            <a href="../inicio/index.html">Voltar</a>
        </div>
    </div>

    <!-- Área principal -->
    <div class="content-area">
        <!-- Barra de pesquisa e botão Novo -->
        <div class="search-container">
            <input type="text" id="search" placeholder="Buscar produto...">
            <button class="search-btn">Buscar</button>
            <button class="novo-btn" onclick="abrirFormulario()">Novo Produto</button>
        </div>

        <!-- Tabela de Produtos para Venda -->
        <div class="table-container">
            <h2>Lista de Produtos para Venda</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Preço de Custo</th>
                        <th>Preço de Venda</th>
                        <th>Margem de Lucro</th>
                        <th>Estoque</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Produtos cadastrados serão listados aqui dinamicamente -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Menu lateral de cadastro de produto para venda -->
<div class="menu-lateral" id="menuLateral">
    <div class="menu-content">
        <h2>Novo Produto</h2>
        <form id="formCadastro">
            <label for="nome">Nome do Produto:</label>
            <input type="text" id="nome" name="nome" required>

            <label for="precoCusto">Preço de Custo (R$):</label>
            <input type="number" id="precoCusto" name="precoCusto" step="0.01" required>

            <label for="margemLucro">Margem de Lucro (%):</label>
            <input type="number" id="margemLucro" name="margemLucro" step="0.01" required>

            <label for="precoVenda">Preço de Venda (R$):</label>
            <input type="text" id="precoVenda" name="precoVenda" readonly>

            <label for="estoque">Estoque:</label>
            <input type="number" id="estoque" name="estoque" required>

            <button type="submit" class="submit-btn">Cadastrar Produto</button>
        </form>
        <button class="close-btn" onclick="fecharFormulario()">Fechar</button>
    </div>
</div>
<script src="script.js"></script>
<script>
    function abrirFormulario() {
        document.getElementById("menuLateral").classList.add("aberto");
    }

    function fecharFormulario() {
        document.getElementById("menuLateral").classList.remove("aberto");
    }

    document.getElementById('formCadastro').addEventListener('submit', function(event) {
        event.preventDefault();  // Impede o envio do formulário para demonstração
        calcularPrecoVenda();  // Calcula o preço de venda antes de cadastrar
        alert('Produto cadastrado com sucesso!');
        document.getElementById('formCadastro').reset();  // Limpa o formulário
        fecharFormulario();
    });

    // Função para calcular o preço de venda com base na margem de lucro
    function calcularPrecoVenda() {
        const precoCusto = parseFloat(document.getElementById('precoCusto').value);
        const margemLucro = parseFloat(document.getElementById('margemLucro').value);

        if (precoCusto && margemLucro) {
            const precoVenda = precoCusto + (precoCusto * (margemLucro / 100));
            document.getElementById('precoVenda').value = precoVenda.toFixed(2);
        }
    }
</script>



</body>
</html>
