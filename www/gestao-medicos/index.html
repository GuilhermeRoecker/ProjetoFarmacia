<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Médicos</title>
    <link rel="stylesheet" href="gestao-medicos.css">
</head>
<body>

<header>Gestão de Médicos</header>

<div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="card">
            <h3>Voltar</h3>
            <a href="../inicio/index.html">Voltar</a>
        </div>
    </div>

    <!-- Área principal -->
    <div class="content-area">
        <!-- Barra de busca e botões -->
        <div class="search-container">
            <input type="text" placeholder="Buscar médico...">
            <button class="search-btn">Buscar</button>
            <button class="novo-btn" onclick="abrirMenuLateral()">Novo</button>
        </div>

        <!-- Tabela de médicos -->
        <div class="table-container">
            <h2>Lista de Médicos</h2>
            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Função</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="tabela-medicos">
                    <!-- Dados dos médicos serão preenchidos dinamicamente pelo backend -->
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Menu lateral de cadastro -->
<div class="menu-lateral" id="menuLateral">
    <div class="menu-content">
        <h2>Cadastrar Médico</h2>
        <form>
            <label for="nome">Nome:</label>
            <input type="text" id="nome" required>

            <label for="dtNascimento">Data de Nascimento:</label>
            <input type="date" id="dtNascimento" required>

            <label for="documento">CPF:</label>
            <input type="text" id="documento" required>

            <label for="telefone">Telefone:</label>
            <input type="text" id="telefone" required>

            <label for="email">E-mail:</label>
            <input type="email" id="email">

            <label for="crm">CRM:</label>
            <input type="text" id="crm" required>

            <label for="especialidade">Especialidade:</label>
            <input type="text" id="especialidade" required>

            <label for="username">Usuário:</label>
            <input type="text" id="username" required>

            <label for="senha">Senha:</label>
            <input type="password" id="senha" required>

            <button type="submit">Cadastrar</button>
        </form>
        <button class="close-btn" onclick="fecharMenuLateral()">Fechar</button>
    </div>
</div>

<script>
    function abrirMenuLateral() {
        document.getElementById("menuLateral").classList.add("aberto");
    }

    function fecharMenuLateral() {
        document.getElementById("menuLateral").classList.remove("aberto");
    }
</script>

</body>
</html>
